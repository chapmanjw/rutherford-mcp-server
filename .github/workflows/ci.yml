name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      # The unit test step (with the coverage floor in pyproject addopts) is a required
      # gate: a failing test or coverage below the floor fails the build, with no override.
      # Live-CLI integration tests stay deselected here (no auth available in CI).
      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: License header check
        run: uv run python scripts/check_license_headers.py

      - name: Type check (mypy, strict)
        run: uv run mypy

      - name: Unit tests (with coverage floor)
        run: uv run pytest

      - name: Build sdist and wheel
        run: uv build
