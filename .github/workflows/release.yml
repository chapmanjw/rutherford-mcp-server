name: Release

# Tag-driven. Publishes to PyPI via trusted publishing (OIDC, no token), then creates
# the GitHub Release with notes extracted from CHANGELOG.md and the built artifacts attached.

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      id-token: write # PyPI trusted publishing (OIDC) - no API token needed
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify tag matches pyproject.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject.toml version $ver"
            exit 1
          fi

      - name: Install dependencies
        run: uv sync

      - name: Run the full checks
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run python scripts/check_license_headers.py
          uv run mypy
          uv run pytest

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Build the distributable artifacts
        run: uv build

      - name: Extract release notes from the changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            index($0, "## [" ver "]") == 1 { flag = 1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "::warning::no changelog section for $version; the release will use generated notes"
          fi

      - name: Determine prerelease status
        id: prerelease
        run: |
          case "$GITHUB_REF_NAME" in
            *-rc*|*-alpha*|*-beta*) echo "value=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "value=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: notes.md
          prerelease: ${{ steps.prerelease.outputs.value }}
          files: dist/*
